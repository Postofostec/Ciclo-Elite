<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ciclo Elite" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Ciclo Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3e;
      --accent: #e8c547;
      --accent2: #4ecdc4;
      --accent3: #ff6b6b;
      --green: #5af78e;
      --text: #e8e8f0;
      --text2: #8888aa;
      --text3: #4a4a6a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; overflow: hidden; }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

    /* ─── SPLASH ─── */
    #splash { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; transition: opacity 0.6s ease; }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo { width: 80px; height: 80px; background: linear-gradient(135deg, var(--accent) 0%, #f5a623 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .splash-title { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 4px; color: var(--accent); }
    .splash-sub { font-size: 14px; color: var(--text2); letter-spacing: 2px; }
    .splash-loader { width: 120px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 24px; }
    .splash-loader-bar { height: 100%; background: var(--accent); border-radius: 2px; animation: load 1.2s ease forwards; }
    @keyframes load { from { width: 0 } to { width: 100% } }

    /* ─── HEADER ─── */
    header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .logo-mark { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
    .xp-badge { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent2); background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.3); padding: 4px 10px; border-radius: 20px; }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav { display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
    .nav-btn { flex: 1; padding: 12px 4px 10px; border: none; background: transparent; color: var(--text3); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; }
    .nav-btn .nav-icon { font-size: 20px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(232,197,71,0.6)); }

    /* ─── PAGES ─── */
    .page { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .page::-webkit-scrollbar { display: none; }
    .page.active { display: flex; flex-direction: column; }

    /* ─── CYCLE TABS ─── */
    .cycle-tabs { display: flex; gap: 8px; padding: 12px 16px 8px; flex-shrink: 0; }
    .cycle-tab { flex: 1; padding: 10px 0; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 2px; border-radius: 8px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .cycle-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.06); }
    .cycle-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
    .cycle-tab .tab-progress { display: block; font-size: 10px; font-weight: 400; color: var(--text3); letter-spacing: 1px; margin-top: 2px; }
    .cycle-tab.active .tab-progress { color: var(--accent); opacity: 0.7; }

    /* ─── CONTENT ─── */
    #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 24px; }
    #content::-webkit-scrollbar { display: none; }

    /* ─── WEEK BLOCK ─── */
    .week-block { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
    .week-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; user-select: none; gap: 12px; }
    .week-number { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text3); min-width: 32px; }
    .week-title { flex: 1; font-size: 17px; font-weight: 700; letter-spacing: 1px; color: var(--text); line-height: 1.2; }
    .week-meta { display: flex; align-items: center; gap: 8px; }
    .week-prog-ring { width: 36px; height: 36px; flex-shrink: 0; }
    .week-chevron { font-size: 16px; color: var(--text3); transition: transform 0.25s; flex-shrink: 0; }
    .week-block.open .week-chevron { transform: rotate(90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
    .ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transform-origin: center; transform: rotate(-90deg); transition: stroke-dashoffset 0.4s ease; }
    .ring-text { fill: var(--text2); font-family: 'Space Mono', monospace; font-size: 7px; text-anchor: middle; dominant-baseline: middle; }

    /* ─── SUBJECT BLOCK ─── */
    .week-subjects { display: none; padding: 0 16px 14px; flex-direction: column; gap: 10px; }
    .week-block.open .week-subjects { display: flex; }
    .subject-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .subject-name { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent2); text-transform: uppercase; margin-bottom: 8px; }
    .topic-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .topic-row:last-child { border-bottom: none; }
    .topic-text { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; padding-top: 2px; }
    .topic-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .checks-container { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 140px; }
    .check-box { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 13px; flex-shrink: 0; }
    .check-box.done { background: var(--accent); border-color: var(--accent); }
    .check-box.done::after { content: '✓'; color: #0a0a0f; font-weight: 700; font-size: 12px; }
    .btn-add { width: 22px; height: 22px; border: 2px solid var(--text3); background: transparent; color: var(--text3); border-radius: 5px; cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .btn-add:active { transform: scale(0.9); border-color: var(--accent); color: var(--accent); }

    /* ─── STREAK BANNER ─── */
    .streak-banner { margin: 12px 16px 0; padding: 12px 16px; background: linear-gradient(135deg, rgba(232,197,71,0.08), rgba(78,205,196,0.05)); border: 1px solid rgba(232,197,71,0.2); border-radius: 10px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .streak-fire { font-size: 24px; }
    .streak-info { flex: 1; }
    .streak-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; }
    .streak-val { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--accent); }

    /* ─── GLOBAL PROGRESS ─── */
    .global-prog { margin: 8px 16px 4px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .gp-label { font-size: 12px; color: var(--text2); letter-spacing: 1px; flex: 1; }
    .gp-bar-wrap { flex: 2; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .gp-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
    .gp-val { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); min-width: 36px; text-align: right; }

    /* ─── LOADING STATE ─── */
    .loading-dots { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 8px; }
    .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dot-bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* ─── TOAST ─── */
    .toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(60px); background: var(--accent); color: #0a0a0f; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; padding: 10px 20px; border-radius: 30px; z-index: 500; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ═══════════════════════════════════════
       CALENDÁRIO
    ═══════════════════════════════════════ */
    .cal-page { padding: 0; }
    .cal-section { padding: 16px; }

    /* Month grid */
    .cal-month-header { font-size: 12px; letter-spacing: 2px; color: var(--text3); font-weight: 600; padding: 8px 4px 6px; }
    .cal-week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
    .cal-day-label { text-align: center; font-size: 10px; color: var(--text3); letter-spacing: 1px; font-weight: 600; padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
    .cal-day { min-height: 44px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; position: relative; padding: 4px 2px; }
    .cal-day:empty, .cal-day.empty { border-color: transparent; background: transparent; cursor: default; }
    .cal-day.today { border-color: var(--accent); background: rgba(232,197,71,0.08); }
    .cal-day.has-study { border-color: rgba(78,205,196,0.4); }
    .cal-day.has-study.goal-met { border-color: var(--green); background: rgba(90,247,142,0.07); }
    .cal-day-num { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text2); }
    .cal-day.today .cal-day-num { color: var(--accent); font-weight: 700; }
    .cal-day-dots { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center; max-width: 28px; }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent2); }
    .cal-dot.done { background: var(--green); }
    .cal-q-count { font-size: 9px; color: var(--text3); margin-top: 1px; font-family: 'Space Mono', monospace; }
    .cal-day.goal-met .cal-q-count { color: var(--green); }

    /* Day detail panel */
    .day-panel { position: fixed; inset: 0; background: rgba(10,10,15,0.92); z-index: 300; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .day-panel.open { opacity: 1; pointer-events: all; }
    .day-panel-inner { background: var(--surface); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 0 0 calc(20px + var(--safe-bottom)); max-height: 85vh; overflow-y: auto; }
    .day-panel-inner::-webkit-scrollbar { display: none; }
    .day-panel-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .day-panel-header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .day-panel-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
    .day-panel-close { width: 32px; height: 32px; border: 1px solid var(--border); background: transparent; color: var(--text2); border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .day-panel-cycle-tabs { display: flex; gap: 8px; padding: 12px 16px; }
    .dp-cycle-btn { flex: 1; padding: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .dp-cycle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.06); }

    /* Subject question cards */
    .day-subjects { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
    .day-subj-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .day-subj-card.goal-met { border-color: rgba(90,247,142,0.4); }
    .day-subj-name { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent2); text-transform: uppercase; margin-bottom: 4px; }
    .day-subj-slot { font-size: 12px; color: var(--text3); letter-spacing: 1px; margin-bottom: 12px; }
    .day-q-row { display: flex; align-items: center; gap: 10px; }
    .day-q-label { font-size: 13px; color: var(--text2); flex: 1; letter-spacing: 0.5px; }
    .day-q-ctrl { display: flex; align-items: center; gap: 8px; }
    .q-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .q-btn:active { transform: scale(0.88); }
    .q-btn.plus { border-color: var(--accent2); color: var(--accent2); }
    .q-btn.minus { border-color: var(--text3); color: var(--text3); }
    .q-val { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--text); min-width: 40px; text-align: center; }
    .day-q-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .day-q-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent2), var(--green)); transition: width 0.3s ease; }

    /* Daily summary in panel */
    .day-summary { margin: 0 16px 4px; padding: 12px 16px; background: rgba(232,197,71,0.05); border: 1px solid rgba(232,197,71,0.15); border-radius: 10px; display: flex; align-items: center; gap: 12px; }
    .day-summary-icon { font-size: 22px; }
    .day-summary-info { flex: 1; }
    .day-summary-total { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
    .day-summary-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; }
    .day-summary-goal { font-family: 'Space Mono', monospace; font-size: 11px; }
    .day-summary-goal.met { color: var(--green); }
    .day-summary-goal.unmet { color: var(--text3); }

    /* ─── Q-STREAK BANNER ─── */
    .q-streak-banner { margin: 0 16px 8px; padding: 10px 14px; background: linear-gradient(135deg, rgba(90,247,142,0.07), rgba(78,205,196,0.04)); border: 1px solid rgba(90,247,142,0.2); border-radius: 10px; display: flex; align-items: center; gap: 10px; }
    .q-streak-icon { font-size: 20px; }
    .q-streak-label { font-size: 11px; color: var(--text3); letter-spacing: 1px; }
    .q-streak-val { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--green); }
    .q-streak-meta { margin-left: auto; font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }
  </style>
</head>
<body>
<div id="splash">
  <div class="splash-logo">⚔️</div>
  <div class="splash-title">CICLO ELITE</div>
  <div class="splash-sub">PROTOCOLO DE ALTO RENDIMENTO</div>
  <div class="splash-loader"><div class="splash-loader-bar"></div></div>
</div>

<div id="app">
  <header>
    <div class="header-top">
      <div class="logo-mark">⚔ CICLO ELITE</div>
      <div class="xp-badge" id="xp-badge">XP: 0</div>
    </div>
  </header>

  <!-- ─── PAGE: ESTUDO ─── -->
  <div class="page active" id="page-estudo">
    <div class="streak-banner" id="streak-banner">
      <div class="streak-fire">🔥</div>
      <div class="streak-info">
        <div class="streak-label">SEQUÊNCIA ATIVA</div>
        <div class="streak-val" id="streak-val">0 dias</div>
      </div>
      <div style="font-size:13px;color:var(--text2);letter-spacing:1px;" id="total-checks">0 revisões</div>
    </div>

    <div class="cycle-tabs">
      <button class="cycle-tab active" data-cycle="alfa" onclick="switchCycle('alfa')">
        CICLO ALFA
        <span class="tab-progress" id="tab-prog-alfa">0%</span>
      </button>
      <button class="cycle-tab" data-cycle="bravo" onclick="switchCycle('bravo')">
        CICLO BRAVO
        <span class="tab-progress" id="tab-prog-bravo">0%</span>
      </button>
    </div>

    <div class="global-prog">
      <div class="gp-label" id="gp-label">ALFA — PROGRESSO GERAL</div>
      <div class="gp-bar-wrap"><div class="gp-bar" id="gp-bar" style="width:0%"></div></div>
      <div class="gp-val" id="gp-val">0%</div>
    </div>

    <div id="content" style="flex:1;overflow-y:auto;padding:16px 16px 24px;">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ─── PAGE: CALENDÁRIO ─── -->
  <div class="page" id="page-calendario">
    <div style="flex-shrink:0;">
      <div class="q-streak-banner" id="q-streak-banner" style="margin-top:12px;">
        <div class="q-streak-icon">⚡</div>
        <div>
          <div class="q-streak-label">STREAK DE QUESTÕES</div>
          <div class="q-streak-val" id="q-streak-val">0 dias</div>
        </div>
        <div class="q-streak-meta" id="q-streak-meta">META: 50/dia</div>
      </div>
    </div>
    <div id="cal-content" style="flex:1;overflow-y:auto;padding:0 16px 24px;">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ─── BOTTOM NAV ─── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-estudo" onclick="switchPage('estudo')">
      <span class="nav-icon">📚</span>
      ESTUDO
    </button>
    <button class="nav-btn" id="nav-calendario" onclick="switchPage('calendario')">
      <span class="nav-icon">📅</span>
      CALENDÁRIO
    </button>
  </nav>
</div>

<!-- ─── DAY PANEL ─── -->
<div class="day-panel" id="day-panel" onclick="closeDayPanelIfBg(event)">
  <div class="day-panel-inner" id="day-panel-inner">
    <div class="day-panel-handle"></div>
    <div class="day-panel-header">
      <div class="day-panel-title" id="dp-title">Segunda-feira</div>
      <button class="day-panel-close" onclick="closeDayPanel()">✕</button>
    </div>
    <div class="day-panel-cycle-tabs">
      <button class="dp-cycle-btn active" id="dp-alfa-btn" onclick="switchDPCycle('alfa')">CICLO ALFA</button>
      <button class="dp-cycle-btn" id="dp-bravo-btn" onclick="switchDPCycle('bravo')">CICLO BRAVO</button>
    </div>
    <div class="day-summary" id="dp-summary">
      <div class="day-summary-icon">📊</div>
      <div class="day-summary-info">
        <div class="day-summary-total" id="dp-total-q">0</div>
        <div class="day-summary-label">QUESTÕES HOJE</div>
      </div>
      <div class="day-summary-goal unmet" id="dp-goal-status">0/50 ▸ META</div>
    </div>
    <div class="day-subjects" id="dp-subjects"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

let state = {
  cycle: 'alfa',
  checks: {},
  boxes: {},
  streak: 0,
  lastActivity: null,
  totalXP: 0,
  // questões: { 'YYYY-MM-DD': { cycleId: { subjName: count } } }
  questoes: {},
  // qStreak: days in a row hitting the goal
  qStreak: 0,
  qStreakLastDate: null
};

let dpCycle = 'alfa'; // cycle shown in day panel

// ─── SUPABASE ───
async function loadFromDB() {
  try {
    const { data, error } = await sb.from('study_progress').select('*').eq('user_id', 'default').single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data) {
      state.checks = data.checks || {};
      state.boxes = data.boxes || {};
      state.streak = data.streak || 0;
      state.lastActivity = data.last_activity || null;
      state.totalXP = data.total_xp || 0;
      // Load questoes from boxes field extension or a separate key
      if (data.boxes && data.boxes.__questoes__) {
        state.questoes = data.boxes.__questoes__;
      }
      if (data.boxes && data.boxes.__qStreak__) {
        state.qStreak = data.boxes.__qStreak__;
        state.qStreakLastDate = data.boxes.__qStreakLastDate__ || null;
      }
    }
  } catch(e) {
    console.warn('DB load error, using local:', e);
    const local = localStorage.getItem('ciclo_elite_state');
    if (local) {
      const parsed = JSON.parse(local);
      state.checks = parsed.checks || {};
      state.boxes = parsed.boxes || {};
      state.streak = parsed.streak || 0;
      state.lastActivity = parsed.lastActivity || null;
      state.totalXP = parsed.totalXP || 0;
      state.questoes = parsed.questoes || {};
      state.qStreak = parsed.qStreak || 0;
      state.qStreakLastDate = parsed.qStreakLastDate || null;
    }
  }
}

async function saveToDB() {
  // Store questoes inside boxes as a special key
  const boxesWithQ = { ...state.boxes };
  boxesWithQ.__questoes__ = state.questoes;
  boxesWithQ.__qStreak__ = state.qStreak;
  boxesWithQ.__qStreakLastDate__ = state.qStreakLastDate;

  const payload = {
    user_id: 'default',
    checks: state.checks,
    boxes: boxesWithQ,
    streak: state.streak,
    last_activity: state.lastActivity,
    total_xp: state.totalXP,
    updated_at: new Date().toISOString()
  };
  try {
    await sb.from('study_progress').upsert(payload, { onConflict: 'user_id' });
  } catch(e) {
    console.warn('DB save error, using local:', e);
  }
  localStorage.setItem('ciclo_elite_state', JSON.stringify({
    checks: state.checks, boxes: state.boxes,
    streak: state.streak, lastActivity: state.lastActivity,
    totalXP: state.totalXP, questoes: state.questoes,
    qStreak: state.qStreak, qStreakLastDate: state.qStreakLastDate
  }));
}

async function ensureTable() {
  try { await sb.from('study_progress').select('user_id').limit(1); } catch(e) {}
}

// ─── STREAK ───
function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastActivity === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastActivity === yesterday) {
    state.streak++;
  } else if (state.lastActivity !== today) {
    state.streak = 1;
  }
  state.lastActivity = today;
}

// ─── Q-STREAK ───
function getDateKey(date) {
  // YYYY-MM-DD
  const d = date || new Date();
  return d.toISOString().slice(0,10);
}

function getDayTotal(dateKey, cycleId) {
  const dayData = state.questoes[dateKey];
  if (!dayData) return 0;
  const cycleData = dayData[cycleId];
  if (!cycleData) return 0;
  return Object.values(cycleData).reduce((s,v) => s+v, 0);
}

function getAllCyclesTotalForDay(dateKey) {
  let total = 0;
  for (const cycle of ['alfa','bravo']) {
    total += getDayTotal(dateKey, cycle);
  }
  return total;
}

function updateQStreak(dateKey) {
  const total = getAllCyclesTotalForDay(dateKey);
  const today = getDateKey(new Date());

  if (dateKey !== today) return; // only update streak for today

  if (total >= Q_GOAL) {
    // Met goal today
    if (state.qStreakLastDate === null) {
      state.qStreak = 1;
    } else {
      const yesterday = getDateKey(new Date(Date.now() - 86400000));
      if (state.qStreakLastDate === yesterday || state.qStreakLastDate === today) {
        if (state.qStreakLastDate !== today) state.qStreak++;
      } else {
        // Gap — reset
        state.qStreak = 1;
      }
    }
    state.qStreakLastDate = today;
  } else {
    // Didn't meet goal; if we were tracking today and now dropped below, keep streak as is (not zeroed mid-day)
    // Streak only resets at start of new day without hitting goal from previous flow
  }
}

// ─── PROGRESS CALC ───
function getTopicKey(cycleId, weekId, subjectId, topicIndex) {
  return `${cycleId}__${weekId}__${subjectId}__${topicIndex}`;
}
function getBoxCount(key) { return state.boxes[key] || 1; }
function getCheckCount(key) { return state.checks[key] || 0; }
function isTopicComplete(key) { return getCheckCount(key) >= getBoxCount(key); }

function getWeekProgress(cycleId, week) {
  let total = 0, done = 0;
  for (const subj of week.subjects) {
    for (let i = 0; i < subj.topics.length; i++) {
      const key = getTopicKey(cycleId, week.id, subj.id, i);
      total++;
      if (isTopicComplete(key)) done++;
    }
  }
  return { total, done, pct: total ? Math.round((done/total)*100) : 0 };
}

function getCycleProgress(cycleId) {
  const cycle = CYCLES[cycleId];
  let total = 0, done = 0;
  for (const month of cycle.months) {
    for (const week of month.weeks) {
      const { total: t, done: d } = getWeekProgress(cycleId, week);
      total += t; done += d;
    }
  }
  return total ? Math.round((done/total)*100) : 0;
}

function buildRing(pct) {
  const r = 14, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `<svg class="week-prog-ring" viewBox="0 0 36 36">
    <circle class="ring-bg" cx="18" cy="18" r="${r}"/>
    <circle class="ring-fg" cx="18" cy="18" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="stroke:${pct===100?'var(--accent2)':'var(--accent)'}"/>
    <text class="ring-text" x="18" y="18">${pct}%</text>
  </svg>`;
}

function renderContent() {
  const cycle = CYCLES[state.cycle];
  let html = '';
  for (const month of cycle.months) {
    html += `<div style="font-size:12px;letter-spacing:2px;color:var(--text3);padding:8px 4px 6px;font-weight:600">${month.title.toUpperCase()}</div>`;
    for (const week of month.weeks) {
      const prog = getWeekProgress(state.cycle, week);
      const ringHtml = buildRing(prog.pct);
      html += `<div class="week-block" id="wb-${week.id}">
        <div class="week-header" onclick="toggleWeek('${week.id}')">
          <div class="week-number">S${week.week.toString().padStart(2,'0')}</div>
          <div class="week-title" style="color:${prog.pct===100?'var(--accent2)':''}">${week.title}</div>
          <div class="week-meta">${ringHtml}<span class="week-chevron">›</span></div>
        </div>
        <div class="week-subjects">`;
      for (const subj of week.subjects) {
        html += `<div class="subject-block"><div class="subject-name">${subj.name}</div>`;
        for (let i = 0; i < subj.topics.length; i++) {
          const key = getTopicKey(state.cycle, week.id, subj.id, i);
          const boxCount = getBoxCount(key);
          const checkCount = getCheckCount(key);
          const complete = checkCount >= boxCount;
          let boxesHtml = '<div class="checks-container">';
          for (let b = 0; b < boxCount; b++) {
            const checked = b < checkCount;
            boxesHtml += `<div class="check-box ${checked ? 'done' : ''}" onclick="toggleCheck('${key}', ${b})" data-key="${key}" data-box="${b}"></div>`;
          }
          boxesHtml += '</div>';
          html += `<div class="topic-row" id="tr-${key}" style="${complete?'opacity:0.7':''}">
            <div class="topic-text" style="${complete?'text-decoration:line-through;color:var(--text3)':''}">${subj.topics[i]}</div>
            <div class="topic-controls">${boxesHtml}<button class="btn-add" onclick="addBox('${key}')" title="Adicionar revisão">+</button></div>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div></div>`;
    }
  }
  document.getElementById('content').innerHTML = html;
  renderProgress();
}

// ─── INTERACTIONS ───
function toggleWeek(weekId) {
  document.getElementById('wb-' + weekId).classList.toggle('open');
}

function toggleCheck(key, boxIndex) {
  const currentChecks = state.checks[key] || 0;
  const boxCount = getBoxCount(key);
  if (boxIndex === currentChecks && currentChecks < boxCount) {
    state.checks[key] = currentChecks + 1;
    updateStreak();
    showToast(currentChecks + 1 >= boxCount ? '✓ TÓPICO COMPLETO!' : '✓ REVISÃO MARCADA');
  } else if (boxIndex < currentChecks) {
    state.checks[key] = boxIndex;
    showToast('Marcação removida');
  }
  updateCheckboxUI(key);
  updateWeekRing(key);
  renderProgress();
  saveToDB();
}

function addBox(key) {
  state.boxes[key] = getBoxCount(key) + 1;
  updateCheckboxUI(key);
  renderProgress();
  saveToDB();
  showToast('+ 1 REVISÃO ADICIONADA');
}

function updateCheckboxUI(key) {
  const boxCount = getBoxCount(key);
  const checkCount = state.checks[key] || 0;
  const complete = checkCount >= boxCount;
  const row = document.getElementById('tr-' + key);
  if (!row) return;
  row.style.opacity = complete ? '0.7' : '1';
  const textEl = row.querySelector('.topic-text');
  if (textEl) { textEl.style.textDecoration = complete ? 'line-through' : ''; textEl.style.color = complete ? 'var(--text3)' : ''; }
  const container = row.querySelector('.checks-container');
  if (!container) return;
  let boxesHtml = '';
  for (let b = 0; b < boxCount; b++) {
    const checked = b < checkCount;
    boxesHtml += `<div class="check-box ${checked ? 'done' : ''}" onclick="toggleCheck('${key}', ${b})" data-key="${key}" data-box="${b}"></div>`;
  }
  container.innerHTML = boxesHtml;
}

function updateWeekRing(key) {
  const parts = key.split('__');
  const weekId = parts[1];
  const weekBlock = document.getElementById('wb-' + weekId);
  if (!weekBlock) return;
  const cycle = CYCLES[state.cycle];
  let targetWeek = null;
  for (const month of cycle.months) {
    for (const w of month.weeks) { if (w.id === weekId) { targetWeek = w; break; } }
    if (targetWeek) break;
  }
  if (!targetWeek) return;
  const prog = getWeekProgress(state.cycle, targetWeek);
  const ring = weekBlock.querySelector('.week-prog-ring');
  if (!ring) return;
  const r = 14, circ = 2 * Math.PI * r;
  const offset = circ - (prog.pct / 100) * circ;
  ring.innerHTML = `<circle class="ring-bg" cx="18" cy="18" r="${r}"/><circle class="ring-fg" cx="18" cy="18" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="stroke:${prog.pct===100?'var(--accent2)':'var(--accent)'}"/><text class="ring-text" x="18" y="18">${prog.pct}%</text>`;
  const titleEl = weekBlock.querySelector('.week-title');
  if (titleEl) titleEl.style.color = prog.pct === 100 ? 'var(--accent2)' : '';
}

// CALENDÁRIO
// ═══════════════════════════════════════
function renderCalendar() {
  const now = new Date();
  // Show 3 months: previous, current, next
  let html = '';
  for (let mo = -1; mo <= 1; mo++) {
    const d = new Date(now.getFullYear(), now.getMonth() + mo, 1);
    html += renderMonth(d, now);
  }
  document.getElementById('cal-content').innerHTML = html;
  renderProgress();

  // Scroll to today marker
  setTimeout(() => {
    const todayEl = document.querySelector('.cal-day.today');
    if (todayEl) todayEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 100);
}

function renderMonth(firstDay, today) {
  const year = firstDay.getFullYear();
  const month = firstDay.getMonth();
  const monthName = MONTH_NAMES[month] + ' ' + year;

  // How many days in month
  const daysInMonth = new Date(year, month+1, 0).getDate();
  // Day of week of first day (0=Sun)
  const startDow = firstDay.getDay();

  let html = `<div class="cal-month-header">${monthName.toUpperCase()}</div>`;
  html += `<div class="cal-week-days">${DAY_SHORT.map(d=>`<div class="cal-day-label">${d}</div>`).join('')}</div>`;
  html += `<div class="cal-grid">`;

  // Blank cells before first day
  for (let i = 0; i < startDow; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const dow = date.getDay();
    const dateKey = getDateKey(date);
    const isToday = (date.toDateString() === today.toDateString());

    const totalQ = getAllCyclesTotalForDay(dateKey);
    const goalMet = totalQ >= Q_GOAL;

    // Dots: one per subject studied (any cycle)
    let dotsHtml = '';
    let hasStudy = totalQ > 0;
    if (hasStudy) {
      // count distinct subjects with questoes
      let count = 0;
      for (const cycle of ['alfa','bravo']) {
        const dd = state.questoes[dateKey];
        if (dd && dd[cycle]) count += Object.keys(dd[cycle]).length;
      }
      const dotCount = Math.min(count, 6);
      for (let d2 = 0; d2 < dotCount; d2++) {
        dotsHtml += `<div class="cal-dot ${goalMet?'done':''}"></div>`;
      }
    }

    const qLabel = totalQ > 0 ? `<div class="cal-q-count">${totalQ}q</div>` : '';

    html += `<div class="cal-day ${isToday?'today':''} ${hasStudy?'has-study':''} ${goalMet?'goal-met':''}" 
      onclick="openDayPanel(${year},${month},${day})">
      <div class="cal-day-num">${day}</div>
      <div class="cal-day-dots">${dotsHtml}</div>
      ${qLabel}
    </div>`;
  }

  html += `</div>`;
  return html;
}

  if (!dpDate) return;
  const dow = dpDate.getDay();
  const dateKey = getDateKey(dpDate);
  const subjects = SCHEDULE[dpCycle][dow] || [];

  // Summary
  const totalToday = getAllCyclesTotalForDay(dateKey);
  const goalMet = totalToday >= Q_GOAL;
  document.getElementById('dp-total-q').textContent = totalToday;
  const goalEl = document.getElementById('dp-goal-status');
  goalEl.textContent = goalMet ? '✓ META BATIDA! +XP' : `${totalToday}/${Q_GOAL} ▸ META`;
  goalEl.className = 'day-summary-goal ' + (goalMet ? 'met' : 'unmet');

  let html = '';
  for (const s of subjects) {
    const q = getSubjQ(dateKey, dpCycle, s.subj);
    const pct = Math.min(100, Math.round((q / Q_GOAL) * 100));
    const cardMet = q >= Q_GOAL;
    html += `<div class="day-subj-card ${cardMet?'goal-met':''}">
      <div class="day-subj-name">${s.subj}</div>
      <div class="day-subj-slot">${s.slot}</div>
      <div class="day-q-row">
        <div class="day-q-label">Questões resolvidas</div>
        <div class="day-q-ctrl">
          <button class="q-btn minus" onclick="changeQ('${dateKey}','${dpCycle}','${s.subj}',-5)">−5</button>
          <button class="q-btn minus" onclick="changeQ('${dateKey}','${dpCycle}','${s.subj}',-1)">−</button>
          <div class="q-val">${q}</div>
          <button class="q-btn plus" onclick="changeQ('${dateKey}','${dpCycle}','${s.subj}',1)">+</button>
          <button class="q-btn plus" onclick="changeQ('${dateKey}','${dpCycle}','${s.subj}',5)">+5</button>
        </div>
      </div>
      <div class="day-q-bar"><div class="day-q-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  if (subjects.length === 0) {
    html = `<div style="text-align:center;padding:32px;color:var(--text3);font-size:14px;letter-spacing:1px;">SEM MATÉRIAS AGENDADAS</div>`;
  }

  document.getElementById('dp-subjects').innerHTML = html;
}

function getSubjQ(dateKey, cycleId, subjName) {
  const d = state.questoes[dateKey];
  if (!d) return 0;
  const c = d[cycleId];
  if (!c) return 0;
  return c[subjName] || 0;
}

function changeQ(dateKey, cycleId, subjName, delta) {
  if (!state.questoes[dateKey]) state.questoes[dateKey] = {};
  if (!state.questoes[dateKey][cycleId]) state.questoes[dateKey][cycleId] = {};
  const cur = state.questoes[dateKey][cycleId][subjName] || 0;
  const next = Math.max(0, cur + delta);
  state.questoes[dateKey][cycleId][subjName] = next;

  // Check if this day is today and update q streak
  const todayKey = getDateKey(new Date());
  if (dateKey === todayKey) {
    updateQStreak(dateKey);
    const total = getAllCyclesTotalForDay(dateKey);
    if (delta > 0 && total >= Q_GOAL && total - delta < Q_GOAL) {
      showToast('🎯 META BATIDA! STREAK +1!');
    }
  }

  renderDayPanelSubjects();
  renderProgress();
  saveToDB();
}

// ─── TOAST ───
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ─── BOOT ───
async function boot() {
  await ensureTable();
  await loadFromDB();
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    renderContent();
  }, 1400);
}

boot();
</script>

</html>
