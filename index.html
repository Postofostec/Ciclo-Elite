  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ciclo Elite" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="apple-touch-icon" href="icon.png" />

  <title>Ciclo Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3e;
      --accent: #e8c547;
      --accent2: #4ecdc4;
      --accent3: #ff6b6b;
      --text: #e8e8f0;
      --text2: #8888aa;
      --text3: #4a4a6a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ─── SPLASH ─── */
    #splash {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999;
      gap: 16px;
      transition: opacity 0.6s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--accent) 0%, #f5a623 100%);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .splash-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 32px; font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
    }
    .splash-sub {
      font-size: 14px; color: var(--text2);
      letter-spacing: 2px;
    }
    .splash-loader {
      width: 120px; height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 24px;
    }
    .splash-loader-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      animation: load 1.2s ease forwards;
    }
    @keyframes load { from { width: 0 } to { width: 100% } }

    /* ─── HEADER ─── */
    header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-mark {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
    }
    .xp-badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent2);
      background: rgba(78,205,196,0.1);
      border: 1px solid rgba(78,205,196,0.3);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ─── CYCLE TABS ─── */
    .cycle-tabs {
      display: flex; gap: 8px;
      padding: 12px 20px 0;
      flex-shrink: 0;
    }
    .cycle-tab {
      flex: 1;
      padding: 10px 0;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 600;
      letter-spacing: 2px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .cycle-tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,197,71,0.06);
    }
    .cycle-tab.active::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }
    .cycle-tab .tab-progress {
      display: block;
      font-size: 10px; font-weight: 400;
      color: var(--text3);
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .cycle-tab.active .tab-progress { color: var(--accent); opacity: 0.7; }

    /* ─── CONTENT ─── */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 24px;
    }
    #content::-webkit-scrollbar { display: none; }

    /* ─── WEEK BLOCK ─── */
    .week-block {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
    }
    .week-header {
      display: flex; align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }
    .week-number {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      min-width: 32px;
    }
    .week-title {
      flex: 1;
      font-size: 17px; font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1.2;
    }
    .week-meta {
      display: flex; align-items: center; gap: 8px;
    }
    .week-prog-ring {
      width: 36px; height: 36px;
      flex-shrink: 0;
    }
    .week-chevron {
      font-size: 16px;
      color: var(--text3);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .week-block.open .week-chevron { transform: rotate(90deg); }

    /* Progress ring */
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
    .ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
      transform-origin: center; transform: rotate(-90deg);
      transition: stroke-dashoffset 0.4s ease; }
    .ring-text { fill: var(--text2); font-family: 'Space Mono', monospace; font-size: 7px; text-anchor: middle; dominant-baseline: middle; }

    /* ─── SUBJECT BLOCK ─── */
    .week-subjects {
      display: none;
      padding: 0 16px 14px;
      flex-direction: column;
      gap: 10px;
    }
    .week-block.open .week-subjects { display: flex; }

    .subject-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .subject-name {
      font-size: 13px; font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .topic-row {
      display: flex; align-items: flex-start;
      gap: 10px; padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .topic-row:last-child { border-bottom: none; }
    .topic-text {
      flex: 1;
      font-size: 14px; font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      padding-top: 2px;
    }
    .topic-controls {
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .checks-container {
      display: flex; gap: 4px; flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 140px;
    }
    .check-box {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-size: 13px;
      flex-shrink: 0;
    }
    .check-box.done {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-box.done::after { content: '✓'; color: #0a0a0f; font-weight: 700; font-size: 12px; }
    .btn-add {
      width: 22px; height: 22px;
      border: 2px solid var(--text3);
      background: transparent;
      color: var(--text3);
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-add:active { transform: scale(0.9); border-color: var(--accent); color: var(--accent); }

    /* ─── STREAK BANNER ─── */
    .streak-banner {
      margin: 12px 16px 0;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(232,197,71,0.08), rgba(78,205,196,0.05));
      border: 1px solid rgba(232,197,71,0.2);
      border-radius: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .streak-fire { font-size: 24px; }
    .streak-info { flex: 1; }
    .streak-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; }
    .streak-val { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--accent); }

    /* ─── GLOBAL PROGRESS ─── */
    .global-prog {
      margin: 0 16px 4px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .gp-label { font-size: 12px; color: var(--text2); letter-spacing: 1px; flex: 1; }
    .gp-bar-wrap { flex: 2; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .gp-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
    .gp-val { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); min-width: 36px; text-align: right; }

    /* ─── LOADING STATE ─── */
    .loading-dots {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; gap: 8px;
    }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: dot-bounce 1s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dot-bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: calc(24px + var(--safe-bottom));
      left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--accent); color: #0a0a0f;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 1px;
      padding: 10px 20px;
      border-radius: 30px;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--text3);
      font-size: 14px; letter-spacing: 1px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>

let state = {

  totalXP: 0

// ─── SUPABASE HELPERS ───
async function loadFromDB() {
  try {
    const { data, error } = await sb.from('study_progress').select('*').eq('user_id', 'default').single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data) {
      state.checks = data.checks || {};
      state.boxes = data.boxes || {};
      state.streak = data.streak || 0;
      state.lastActivity = data.last_activity || null;
      state.totalXP = data.total_xp || 0;
    }
  } catch(e) {
    console.warn('DB load error, using local:', e);
    const local = localStorage.getItem('ciclo_elite_state');
    if (local) {
      const parsed = JSON.parse(local);
      state.checks = parsed.checks || {};
      state.boxes = parsed.boxes || {};
      state.streak = parsed.streak || 0;
      state.lastActivity = parsed.lastActivity || null;
      state.totalXP = parsed.totalXP || 0;
    }
  }
}

async function saveToDB() {
  const payload = {
    user_id: 'default',
    checks: state.checks,
    boxes: state.boxes,
    streak: state.streak,
    last_activity: state.lastActivity,
    total_xp: state.totalXP,
    updated_at: new Date().toISOString()
  };
  try {
    await sb.from('study_progress').upsert(payload, { onConflict: 'user_id' });
  } catch(e) {
    console.warn('DB save error, using local:', e);
  }
  localStorage.setItem('ciclo_elite_state', JSON.stringify({
    checks: state.checks, boxes: state.boxes,
    streak: state.streak, lastActivity: state.lastActivity,
    totalXP: state.totalXP
  }));
}

// ─── INIT DB TABLE ───
async function ensureTable() {
  try {
    await sb.from('study_progress').select('user_id').limit(1);
  } catch(e) { /* table might not exist yet */ }
}

// ─── STREAK LOGIC ───
function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastActivity === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastActivity === yesterday) {
    state.streak++;
  } else if (state.lastActivity !== today) {
    state.streak = 1;
  }
  state.lastActivity = today;
}

// ─── PROGRESS CALC ───
function getTopicKey(cycleId, weekId, subjectId, topicIndex) {
  return `${cycleId}__${weekId}__${subjectId}__${topicIndex}`;
}

function getBoxCount(key) {
  return state.boxes[key] || 1;
}

function getCheckCount(key) {
  return state.checks[key] || 0;
}

function isTopicComplete(key) {
  return getCheckCount(key) >= getBoxCount(key);
}

function getWeekProgress(cycleId, week) {
  let total = 0, done = 0;
  for (const subj of week.subjects) {
    for (let i = 0; i < subj.topics.length; i++) {
      const key = getTopicKey(cycleId, week.id, subj.id, i);
      total++;
      if (isTopicComplete(key)) done++;
    }
  }
  return { total, done, pct: total ? Math.round((done/total)*100) : 0 };
}

function getCycleProgress(cycleId) {
  const cycle = CYCLES[cycleId];
  let total = 0, done = 0;
  for (const month of cycle.months) {
    for (const week of month.weeks) {
      const { total: t, done: d } = getWeekProgress(cycleId, week);
      total += t; done += d;
    }
  }
  return total ? Math.round((done/total)*100) : 0;
}

// ─── RENDER ───
function renderProgress() {
  const alfaPct = getCycleProgress('alfa');
  const bravoPct = getCycleProgress('bravo');
  document.getElementById('tab-prog-alfa').textContent = alfaPct + '%';
  document.getElementById('tab-prog-bravo').textContent = bravoPct + '%';

  const cur = state.cycle === 'alfa' ? alfaPct : bravoPct;
  document.getElementById('gp-bar').style.width = cur + '%';
  document.getElementById('gp-val').textContent = cur + '%';
  document.getElementById('gp-label').textContent = (state.cycle === 'alfa' ? 'ALFA' : 'BRAVO') + ' — PROGRESSO GERAL';

  document.getElementById('streak-val').textContent = state.streak + (state.streak === 1 ? ' dia' : ' dias');

  let totalChecks = 0;
  for (const v of Object.values(state.checks)) totalChecks += v;
  state.totalXP = totalChecks * 10;
  document.getElementById('total-checks').textContent = totalChecks + ' revisões';
  document.getElementById('xp-badge').textContent = 'XP: ' + state.totalXP;
}

function buildRing(pct) {
  const r = 14, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `<svg class="week-prog-ring" viewBox="0 0 36 36">
    <circle class="ring-bg" cx="18" cy="18" r="${r}"/>
    <circle class="ring-fg" cx="18" cy="18" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="stroke:${pct===100?'var(--accent2)':'var(--accent)'}"/>
    <text class="ring-text" x="18" y="18">${pct}%</text>
  </svg>`;
}

function renderContent() {
  const cycle = CYCLES[state.cycle];
  let html = '';

  for (const month of cycle.months) {
    html += `<div style="font-size:12px;letter-spacing:2px;color:var(--text3);padding:8px 4px 6px;font-weight:600">${month.title.toUpperCase()}</div>`;

    for (const week of month.weeks) {
      const prog = getWeekProgress(state.cycle, week);
      const ringHtml = buildRing(prog.pct);
      const statusColor = prog.pct === 100 ? 'var(--accent2)' : prog.pct > 0 ? 'var(--accent)' : 'var(--text3)';

      html += `<div class="week-block" id="wb-${week.id}">
        <div class="week-header" onclick="toggleWeek('${week.id}')">
          <div class="week-number">S${week.week.toString().padStart(2,'0')}</div>
          <div class="week-title" style="color:${prog.pct===100?'var(--accent2)':''}">${week.title}</div>
          <div class="week-meta">
            ${ringHtml}
            <span class="week-chevron">›</span>
          </div>
        </div>
        <div class="week-subjects">`;

      for (const subj of week.subjects) {
        html += `<div class="subject-block">
          <div class="subject-name">${subj.name}</div>`;

        for (let i = 0; i < subj.topics.length; i++) {
          const key = getTopicKey(state.cycle, week.id, subj.id, i);
          const boxCount = getBoxCount(key);
          const checkCount = getCheckCount(key);
          const complete = checkCount >= boxCount;

          let boxesHtml = '<div class="checks-container">';
          for (let b = 0; b < boxCount; b++) {
            const checked = b < checkCount;
            boxesHtml += `<div class="check-box ${checked ? 'done' : ''}" 
              onclick="toggleCheck('${key}', ${b})" 
              data-key="${key}" data-box="${b}"></div>`;
          }
          boxesHtml += '</div>';

          html += `<div class="topic-row" id="tr-${key}" style="${complete?'opacity:0.7':''}">
            <div class="topic-text" style="${complete?'text-decoration:line-through;color:var(--text3)':''}">${subj.topics[i]}</div>
            <div class="topic-controls">
              ${boxesHtml}
              <button class="btn-add" onclick="addBox('${key}')" title="Adicionar revisão">+</button>
            </div>
          </div>`;
        }

        html += `</div>`;
      }

      html += `</div></div>`;
    }
  }

  document.getElementById('content').innerHTML = html;
  renderProgress();
}

// ─── INTERACTIONS ───
function toggleWeek(weekId) {
  const block = document.getElementById('wb-' + weekId);
  block.classList.toggle('open');
}

function toggleCheck(key, boxIndex) {
  const currentChecks = state.checks[key] || 0;
  const boxCount = getBoxCount(key);

  // If clicking the next unchecked box
  if (boxIndex === currentChecks && currentChecks < boxCount) {
    state.checks[key] = currentChecks + 1;
    updateStreak();
    showToast(currentChecks + 1 >= boxCount ? '✓ TÓPICO COMPLETO!' : '✓ REVISÃO MARCADA');
  } else if (boxIndex < currentChecks) {
    // Uncheck: set to boxIndex
    state.checks[key] = boxIndex;
    showToast('Marcação removida');
  }

  updateCheckboxUI(key);
  updateWeekRing(key);
  renderProgress();
  saveToDB();
}

function addBox(key) {
  state.boxes[key] = getBoxCount(key) + 1;
  updateCheckboxUI(key);
  renderProgress();
  saveToDB();
  showToast('+ 1 REVISÃO ADICIONADA');
}

function updateCheckboxUI(key) {
  const boxCount = getBoxCount(key);
  const checkCount = state.checks[key] || 0;
  const complete = checkCount >= boxCount;
  const row = document.getElementById('tr-' + key);
  if (!row) return;

  row.style.opacity = complete ? '0.7' : '1';
  const textEl = row.querySelector('.topic-text');
  if (textEl) {
    textEl.style.textDecoration = complete ? 'line-through' : '';
    textEl.style.color = complete ? 'var(--text3)' : '';
  }

  const container = row.querySelector('.checks-container');
  if (!container) return;
  let boxesHtml = '';
  for (let b = 0; b < boxCount; b++) {
    const checked = b < checkCount;
    boxesHtml += `<div class="check-box ${checked ? 'done' : ''}" 
      onclick="toggleCheck('${key}', ${b})" 
      data-key="${key}" data-box="${b}"></div>`;
  }
  container.innerHTML = boxesHtml;
}

function updateWeekRing(key) {
  // Find which week this key belongs to and update its ring
  const parts = key.split('__');
  const weekId = parts[1];
  const weekBlock = document.getElementById('wb-' + weekId);
  if (!weekBlock) return;

  // Find the week data
  const cycle = CYCLES[state.cycle];
  let targetWeek = null;
  for (const month of cycle.months) {
    for (const w of month.weeks) {
      if (w.id === weekId) { targetWeek = w; break; }
    }
    if (targetWeek) break;
  }
  if (!targetWeek) return;

  const prog = getWeekProgress(state.cycle, targetWeek);
  const ring = weekBlock.querySelector('.week-prog-ring');
  if (!ring) return;

  const r = 14, circ = 2 * Math.PI * r;
  const offset = circ - (prog.pct / 100) * circ;
  ring.innerHTML = `
    <circle class="ring-bg" cx="18" cy="18" r="${r}"/>
    <circle class="ring-fg" cx="18" cy="18" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="stroke:${prog.pct===100?'var(--accent2)':'var(--accent)'}"/>
    <text class="ring-text" x="18" y="18">${prog.pct}%</text>`;

  const titleEl = weekBlock.querySelector('.week-title');
  if (titleEl) titleEl.style.color = prog.pct === 100 ? 'var(--accent2)' : '';
}

function switchCycle(cycleId) {
  state.cycle = cycleId;
  document.querySelectorAll('.cycle-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cycle === cycleId);
  });
  renderContent();
}

// ─── TOAST ───
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ─── BOOT ───
async function boot() {
  await ensureTable();
  await loadFromDB();

  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    renderContent();
  }, 1400);
}

boot();
</script>
</body>
</html>
